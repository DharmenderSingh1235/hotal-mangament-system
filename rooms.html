<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:20px;
}

.form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 5px 10px gray;
margin-bottom:20px;
}

input,select{

padding:10px;
margin:10px;
width:200px;

}

button{

padding:10px 20px;
background:#28a745;
color:white;
border:none;
cursor:pointer;

}

button:hover{

background:#218838;

}

table{

width:100%;
border-collapse:collapse;
background:white;

}

table,th,td{

border:1px solid #ccc;

}

th{

background:#003366;
color:white;

}

th,td{

padding:12px;
text-align:center;

}

</style>

</head>

<body>

<header>

<h1>🏨 Room Management</h1>

</header>

<div class="container">

<div class="form">

<input
type="number"
id="roomNo"
placeholder="Room Number">

<select id="roomType">

<option>Single</option>

<option>Double</option>

<option>Deluxe</option>

<option>Suite</option>

</select>

<input
type="number"
id="price"
placeholder="Price">

<button onclick="addRoom()">

Add Room

</button>

</div>

<table id="roomTable">

<tr>

<th>Room No</th>

<th>Type</th>

<th>Price</th>

<th>Status</th>

<th>Action</th>

</tr>

</table>

</div>

<script>

let rooms=[];

function addRoom(){

let roomNo=document.getElementById("roomNo").value;

let type=document.getElementById("roomType").value;

let price=document.getElementById("price").value;

rooms.push({

roomNo:roomNo,

type:type,

price:price,

status:"Available"

});

displayRooms();

}

function displayRooms(){

let table=document.getElementById("roomTable");

table.innerHTML=`

<tr>

<th>Room No</th>

<th>Type</th>

<th>Price</th>

<th>Status</th>

<th>Action</th>

</tr>

`;

rooms.forEach((room,index)=>{

table.innerHTML+=`

<tr>

<td>${room.roomNo}</td>

<td>${room.type}</td>

<td>₹${room.price}</td>

<td>${room.status}</td>

<td>

<button onclick="deleteRoom(${index})">

Delete

</button>

</td>

</tr>

`;

});

}

function deleteRoom(index){

rooms.splice(index,1);

displayRooms();

}

</script>

</body>
</html>
