<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Billing System</title>


<style>
    

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ecf0f1;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:30px;
}

.form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 5px 10px gray;
}

input{

padding:10px;
margin:10px;
width:180px;

}

button{

padding:10px 20px;
background:#28a745;
color:white;
border:none;
cursor:pointer;

}

button:hover{

background:#218838;

}

table{

width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;

}

table,th,td{

border:1px solid gray;

}

th{

background:#003366;
color:white;
padding:12px;

}

td{

padding:12px;
text-align:center;

}

</style>

</head>

<body>

<header>

<h1>💳 Billing & Payment</h1>


</header>


<div class="container">

<div class="form">

<input type="text" id="customer" placeholder="Customer Name">

<input type="number" id="days" placeholder="Days Stayed">

<input type="number" id="price" placeholder="Price Per Day">

<button onclick="generateBill()">

Generate Bill

</button>

</div>

<table id="billTable">

<tr>

<th>Customer</th>

<th>Days</th>

<th>Price/Day</th>

<th>Total</th>

<th>Status</th>

</tr>

</table>

</div>

<script>

let bills=[];

function generateBill(){

let customer=document.getElementById("customer").value;

let days=parseInt(document.getElementById("days").value);

let price=parseFloat(document.getElementById("price").value);

let total=days*price;

bills.push({

customer:customer,

days:days,

price:price,

total:total,

status:"Paid"

});

displayBills();

}

function displayBills(){

let table=document.getElementById("billTable");

table.innerHTML=`

<tr>

<th>Customer</th>

<th>Days</th>

<th>Price/Day</th>

<th>Total</th>

<th>Status</th>

</tr>

`;

bills.forEach(b=>{

table.innerHTML+=`

<tr>

<td>${b.customer}</td>

<td>${b.days}</td>

<td>₹${b.price}</td>

<td>₹${b.total}</td>

<td>${b.status}</td>

</tr>

`;

});

}




</script>

</body>
</html>
