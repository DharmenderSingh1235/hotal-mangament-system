<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Revenue Report</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:30px;
}

.cards{

display:grid;
grid-template-columns:repeat(5,1fr);
gap:20px;

}

.card{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 5px 10px gray;
text-align:center;

}

.card h2{

color:#003366;

}

.card h1{

margin-top:10px;
color:#28a745;

}

table{

width:100%;
margin-top:40px;
border-collapse:collapse;
background:white;

}

table,th,td{

border:1px solid gray;

}

th{

background:#003366;
color:white;
padding:12px;

}

td{

padding:12px;
text-align:center;

}

</style>

</head>

<body>

<header>

<h1>📈 Revenue Report</h1>

</header>

<div class="container">

<div class="cards">

<div class="card">

<h2>Total Revenue</h2>

<h1 id="revenue">₹0</h1>

</div>

<div class="card">

<h2>Total Rooms</h2>

<h1 id="rooms">0</h1>

</div>

<div class="card">

<h2>Booked Rooms</h2>

<h1 id="booked">0</h1>

</div>

<div class="card">

<h2>Total Customers</h2>

<h1 id="customers">0</h1>

</div>

<div class="card">

<h2>Total Bookings</h2>

<h1 id="bookings">0</h1>

</div>

</div>

<table>

<tr>

<th>Month</th>
<th>Bookings</th>
<th>Revenue</th>

</tr>

<tr>

<td>January</td>
<td>25</td>
<td>₹50,000</td>

</tr>

<tr>

<td>February</td>
<td>30</td>
<td>₹60,000</td>

</tr>

<tr>

<td>March</td>
<td>40</td>
<td>₹80,000</td>

</tr>

</table>

</div>

<script>

document.getElementById("revenue").innerHTML="₹1,90,000";

document.getElementById("rooms").innerHTML="50";

document.getElementById("booked").innerHTML="35";

document.getElementById("customers").innerHTML="120";

document.getElementById("bookings").innerHTML="95";

</script>

</body>
</html>
