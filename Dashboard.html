<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#ecf0f1;
}

.sidebar{

width:220px;
height:100vh;
background:#2c3e50;
position:fixed;
left:0;
top:0;

}

.sidebar h2{

color:white;
text-align:center;
padding:20px;

}

.sidebar a{

display:block;
color:white;
text-decoration:none;
padding:15px;

}

.sidebar a:hover{

background:#34495e;

}

.main{

margin-left:220px;
padding:30px;

}

.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

margin-top:30px;

}

.card{

background:white;

padding:25px;

border-radius:10px;

box-shadow:0px 5px 10px gray;

text-align:center;

}

.card h1{

color:#27ae60;

margin-top:10px;

}

table{

width:100%;

margin-top:40px;

border-collapse:collapse;

}

table,tr,td,th{

border:1px solid gray;

}

th{

background:#2c3e50;

color:white;

padding:12px;

}

td{

padding:12px;

text-align:center;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>🏨 Hotel</h2>

<a href="dashboard.html">Dashboard</a>

<a href="rooms.html">Rooms</a>

<a href="booking.html">Booking</a>

<a href="customers.html">Customers</a>

<a href="billing.html">Billing</a>

<a href="report.html">Revenue</a>

<a href="index.html">Logout</a>

</div>

<div class="main">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">

<h3>Total Rooms</h3>

<h1>50</h1>

</div>

<div class="card">

<h3>Booked Rooms</h3>

<h1>18</h1>

</div>

<div class="card">

<h3>Available Rooms</h3>

<h1>32</h1>

</div>

<div class="card">

<h3>Total Revenue</h3>

<h1>₹2,50,000</h1>

</div>

</div>

<h2 style="margin-top:40px;">Recent Bookings</h2>

<table>

<tr>

<th>Customer</th>

<th>Room</th>

<th>Status</th>

</tr>

<tr>

<td>Dharmender</td>

<td>101</td>

<td>Confirmed</td>

</tr>

<tr>

<td>Rahul</td>

<td>Confirmed</td>

</tr>

<tr>

<td>Amit</td>

<td>201</td>

<td>Checked In</td>

</tr>

</table>

</div>

</body>
</html>
