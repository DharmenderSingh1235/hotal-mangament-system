<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#003366;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:auto;
padding:30px;
}

.form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 5px 10px gray;
}

input{

padding:10px;
margin:10px;
width:180px;

}

button{

padding:10px 20px;
background:#28a745;
color:white;
border:none;
cursor:pointer;

}

button:hover{

background:#218838;

}

table{

width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;

}

table,th,td{

border:1px solid gray;

}

th{

background:#003366;
color:white;
padding:12px;

}

td{

padding:12px;
text-align:center;

}

</style>

</head>

<body>

<header>

<h1>👥 Customer Management</h1>

</header>

<div class="container">

<div class="form">

<input
type="number"
id="id"
placeholder="Customer ID">

<input
type="text"
id="name"
placeholder="Customer Name">

<input
type="text"
id="phone"
placeholder="Phone Number">

<button onclick="addCustomer()">

Add Customer

</button>

</div>

<table id="customerTable">

<tr>

<th>ID</th>

<th>Name</th>

<th>Phone</th>

<th>Action</th>

</tr>

</table>

</div>

<script>

let customers=[];

function addCustomer(){

let customer={

id:document.getElementById("id").value,

name:document.getElementById("name").value,

phone:document.getElementById("phone").value

};

customers.push(customer);

displayCustomers();

}

function displayCustomers(){

let table=document.getElementById("customerTable");

table.innerHTML=`

<tr>

<th>ID</th>

<th>Name</th>

<th>Phone</th>

<th>Action</th>

</tr>

`;

customers.forEach((c,index)=>{

table.innerHTML+=`

<tr>

<td>${c.id}</td>

<td>${c.name}</td>

<td>${c.phone}</td>

<td>

<button onclick="deleteCustomer(${index})">

Delete

</button>

</td>

</tr>

`;

});

}

function deleteCustomer(index){

customers.splice(index,1);

displayCustomers();

}

</script>

</body>
</html>
